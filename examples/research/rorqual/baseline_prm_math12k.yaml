# Self-contained Rorqual experiment D: Math12k + PRM-augmented GRPO reward + online AR (log/save only).
# Reward = raw_math_score + prm_weight * product(step_scores), where step_scores come from
# Qwen/Qwen2.5-Math-PRM-7B evaluated on step-separated reasoning chunks.
# Intrinsic LeaRS term stays OFF (eta=0); AR still trains/logs for parity with the other baselines.
#
# Important resource note:
#   worker.reward.num_gpus reserves a GPU for the PRM reward worker.
#   Your launcher should leave one GPU outside trainer.n_gpus_per_node, or run on a node with an extra GPU.
#   On a 4-GPU node, the simplest safe smoke setup is trainer.n_gpus_per_node=2 or 3 with rollout.tensor_parallel_size=1.

_lears_launcher:
  schedule_mode: epoch
  total_epochs: 2.0
  warmup_epochs: 0.25
  refresh_epochs: 0.25

data:
  dataset_preset: math12k_math500
  train_files: ""
  val_files: ""
  prompt_key: prompt
  answer_key: answer
  format_prompt: ./examples/format_prompt/math_prm_steps.jinja
  max_prompt_length: 1024
  max_response_length: 4096
  rollout_batch_size: 8
  mini_rollout_batch_size: null
  val_batch_size: 32
  shuffle: true
  seed: 1

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false

worker:
  actor:
    global_batch_size: 8
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 1
    max_grad_norm: 1.0
    padding_free: false
    dynamic_batching: true
    ulysses_size: 1
    model:
      model_path: Qwen/Qwen3-4B
      enable_gradient_checkpointing: true
      trust_remote_code: false
      lora:
        rank: 0
        alpha: 64
        target_modules: all-linear
    optim:
      lr: 1.0e-5
      weight_decay: 1.0e-2
      strategy: adamw
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
      torch_dtype: fp16
      mp_param_dtype: fp16
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 4
    temperature: 1.0
    top_p: 1.0
    dtype: fp16
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.85
    enforce_eager: false
    enable_chunked_prefill: false
    disable_tqdm: false
    val_override_config:
      n: 1
      temperature: 0.0
      top_p: 1.0

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
      torch_dtype: fp16
      mp_param_dtype: fp16
    offload:
      offload_params: false

  reward:
    reward_function: ./examples/reward_function/math_prm_step_reward.py:compute_score
    num_cpus: 4
    num_gpus: 1.0
    reward_function_kwargs:
      prm_model_path: Qwen/Qwen2.5-Math-PRM-7B
      prm_weight: 0.1
      format_weight: 0.1
      max_prm_length: 4096
      max_prm_steps: 8
      min_step_chars: 8
      trust_remote_code: true
      torch_dtype: bfloat16
      device_map: auto

trainer:
  total_epochs: 1
  max_steps: null
  project_name: easy_r1
  experiment_name: rorqual_baseline_prm_product_math12k
  logger: ["file", "wandb"]
  nnodes: 1
  n_gpus_per_node: 4
  max_try_make_batch: 20
  critic_warmup: 0
  val_freq: 100
  val_before_train: false
  val_only: false
  val_generations_to_log: 0
  save_freq: 50
  save_limit: 3
  save_model_only: false
  save_checkpoint_path: null
  load_checkpoint_path: null
  find_last_checkpoint: true

research:
  enabled: true
  checkpoint_subdir: research
  latent:
    source: actor_logprob
    layer_index: -1
    include_prompt: false
    dtype: fp16
    capture_every_n_steps: 1
  buffer:
    backend: parquet
    dir: null
    shard_max_samples: 512
    compression: zstd
    max_disk_gb: 20.0
    max_train_samples: 1024
    flush_every_n_steps: 8
  ar:
    model_type: tiny_transformer
    d_model: 256
    n_layers: 2
    n_heads: 4
    dropout: 0.1
    lr: 1.0e-4
    batch_size: 8
    train_steps: 120
    train_every_n_steps: 16
    min_buffer_samples: 256
    device: cpu
    max_seq_len: 4096
    num_workers: 0
    window_intervals: 2
    async_enabled: true
    async_queue_size: 1
    reload_every_n_steps: 1
  intrinsic:
    mode: weighted_additive
    success_threshold: 0.5
    lambda_success: 0.0
    lambda_failure: 0.0
    eta: 0.0
    gate_mode: failure_only
    lambda_success_gate: 0.25
    temporal_smoothing_window: 3
    normalize_scope: per_sequence_zscore
    normalize: per_sequence_zscore
    clip_value: 3.0
    token_mode: dense
    group_norm_per_timestep: false
  tracing:
    enabled: true
    schema_version: v1
    dir: null
    flush_every_n_steps: 20
    compression: zstd
    save_tokens: true
    save_decoded_text: true
    save_latents: true
    save_ar_error: true
    retention_mode: keep_all
    max_disk_gb: 500.0
    sample_rate: 1.0
